# ============================================
# GESTIONCLIENT - Profil Docker
# ============================================

server.port=8080

# ===== MySQL (utilise le nom du service Docker "mysql") =====
spring.datasource.url=jdbc:mysql://mysql:3306/gestion_client?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===== Jackson =====
spring.jackson.time-zone=Europe/Paris

# ===== JWT =====
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=${JWT_EXPIRATION}

# ===== Logging =====
logging.level.com.gestionclient=INFO
logging.level.org.springframework.security=WARN