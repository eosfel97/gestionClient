# ============================================
# GESTIONCLIENT - Docker Compose
# ============================================
# Lancer : docker compose up --build
# Arrêter : docker compose down
# Tout supprimer (+ données) : docker compose down -v

services:

  # ===== BASE DE DONNÉES =====
  mysql:
    image: mysql:8.0
    container_name: gestionclient-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3307:3306"  # 3307 en local pour ne pas entrer en conflit avec un MySQL existant
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - gestionclient-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== BACKEND (Spring Boot) =====
  backend:
    build:
      context: ./gestionclient-backend
      dockerfile: Dockerfile
    container_name: gestionclient-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gestionclient-network

  # ===== FRONTEND (Next.js) =====
  frontend:
    build:
      context: ./gestionclient-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: gestionclient-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - gestionclient-network

# ===== VOLUMES =====
volumes:
  mysql_data:
    name: gestionclient-mysql-data

# ===== RÉSEAU =====
networks:
  gestionclient-network:
    name: gestionclient-network
    driver: bridge